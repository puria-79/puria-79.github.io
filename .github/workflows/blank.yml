name: Update GitHub Pages Index

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    env:
      OWNER: ${{ github.repository_owner }}
      TARGET_REPO: ${{ vars.GH_PAGES_INDEX_REPO }}
    steps:
      - name: Validate required configuration
        run: |
          if [ -z "$TARGET_REPO" ]; then
            echo "Repository variable GH_PAGES_INDEX_REPO is required."
            echo "Example value: your-username/your-username.github.io"
            exit 1
          fi

      - name: Checkout automation repository
        uses: actions/checkout@v4

      - name: Generate site data
        env:
          GH_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Secret GH_PAGES_TOKEN is required."
            exit 1
          fi

          mkdir -p generated
          bash scripts/generate-pages-data.sh "$OWNER" generated/repos.json

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GH_PAGES_INDEX_REPO }}
          token: ${{ secrets.GH_PAGES_TOKEN }}
          path: target-repo

      - name: Update site files and push
        run: |
          mkdir -p target-repo/pages-index/data
          cp site/index.html target-repo/index.html
          cp site/styles.css target-repo/styles.css
          cp site/app.js target-repo/app.js
          cp generated/repos.json target-repo/data/repos.json
          cd target-repo

          git add pages-index

          if git diff --cached --quiet; then
            echo "pages-index is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update GitHub Pages index site"
          git push
