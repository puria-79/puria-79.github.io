<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub Pages Index</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <p class="eyebrow">Auto-generated</p>
      <h1>GitHub Pages Index</h1>
      <p class="subtitle">All repositories that currently expose a <code>gh-pages</code> branch.</p>
    </header>

    <section class="toolbar">
      <input id="search" type="search" placeholder="Search repositories...">
      <p id="meta"></p>
    </section>

    <section id="grid" class="grid"></section>
    <p id="empty" class="empty" hidden>No repositories matched your search.</p>
  </main>

  <script src="./app.js"></script>
</body>
</html>
